spring.application.name=messaging-consumer-test

spring.cloud.gcp.project-id=test-project
spring.cloud.gcp.pubsub.enabled=false
spring.autoconfigure.exclude=com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration

app.pubsub.enabled=false

spring.datasource.url=jdbc:h2:mem:messaging_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.sql.init.mode=always
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
