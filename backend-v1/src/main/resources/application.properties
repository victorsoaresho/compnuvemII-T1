spring.application.name=messaging-consumer

# Pub/Sub: project_id, subscription e topic vêm do JSON em app.pubsub.credentials-location (bloco pubsub + project_id).
app.pubsub.enabled=true
app.pubsub.credentials-location=file:./credentials/credentials.json

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/compnuvem-t1}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
