services:
  postgres:
    image: postgres:16-alpine
    container_name: compnuvem-t1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: compnuvem-t1
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compnuvem-t1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
